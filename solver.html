<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudoku Solver</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.solver-container{
    text-align:center;
    width:100%;
    max-width:900px;
    padding:20px;
}

#solver-board{
    display:grid;
    grid-template-columns:repeat(9,1fr);

    width:min(80vw,500px);
    height:min(80vw,500px);

    margin:auto;

    border:4px solid black;
    background:white;
}

.solver-cell{

    border:1px solid #ccc;

    width:100%;
    height:100%;

    text-align:center;

    font-size:1.2rem;

    outline:none;

}

.border-right{
    border-right:3px solid black;
}

.border-bottom{
    border-bottom:3px solid black;
}

.controls{

    margin-top:20px;

    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;

}

.controls button{

    padding:12px 20px;

    border:none;
    border-radius:10px;

    background:#2563eb;
    color:white;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="solver-container">

<h1>🧩 Sudoku Solver</h1>

<p>
Enter your Sudoku puzzle and click Solve.
Leave empty cells blank.
</p>

<br>

<div id="solver-board"></div>

<div class="controls">

<button id="solvePuzzle">
Solve Puzzle
</button>

<button id="clearPuzzle">
Clear Board
</button>

<button onclick="window.location='index.html'">
Back To Game
</button>

</div>

</div>

<script src="js/sudokuGenerator.js"></script>
<script src="js/solver.js"></script>

</body>
</html>
